<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid-2</title>
    <style>
        .container {
            border: 2px solid black;
            display: grid;
            grid-template-areas: "nav nav nav"
                "side article article"
                "footer footer footer";
        }

        .item {
            border: 2px solid red;
            height: 55px;
        }

        .items-1 { 
            grid-area: nav;
            background-color: aqua;
        }

        .items-2{
            grid-area: side;
            background-color: beige;
        }

        .items-3 { 
            grid-area: article;
            background-color: green;
        }

        .items-4 {
            grid-area: footer;
            background-color: red;
        }

        .items-5 {
            grid-area: nav;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item items-1">1</div>
        <div class="item items-2">2</div>
        <div class="item items-3">3</div>
        <div class="item items-4">4</div>
        <div class="item items-5">5</div>
    </div>
</body>

</html>
