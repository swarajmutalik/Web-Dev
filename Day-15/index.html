<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */

        div {
            /* background-color: red; */
        }

        /* Class Selector */

        .red {
            background-color: red;
        }

        /* ID Selector  */

        #green {
            background-color: green;
        }

        /* Child Selector */

        div>p {
            color: blue;
            background-color: yellow;
        }

        /* Descendant Selector */

        div p {
            color: blue;
            background-color: yellow;
        }


        /* Universal Selector */

        * {
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selector */

        a:visited {
            color: yellow;
        }

        a:link {
            color: green;
        }

        a:active {
            background-color: red;
        }

        a:hover {
            background-color: yellow;
        }

        p:first-child {
            background-color: aqua;
        }

        .boxes:before { 
            content: "Welcome";
            color: red;
        }

        .boxes::after{
            content: "This course is good";

        }

        .box::first-letter{
            color: peru;
            font-size: 45px;
        }

        input::placeholder{
            color: rgb(84,84,36);
        }
    </style>
</head>

<body>
    <div>
        <main class="one">
            <p>I am first</p>

    </div>

        I am a div
