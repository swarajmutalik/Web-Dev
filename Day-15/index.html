<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */

        div {
            /* background-color: red; */
        }

        /* Class Selector */

        .red {
            background-color: red;
        }

        /* ID Selector  */

        #green {
            background-color: green;
        }

        /* Child Selector */

        div>p {
            color: blue;
            background-color: yellow;
        }

        /* Descendant Selector */

        div p {
            color: blue;
            background-color: yellow;
        }


        /* Universal Selector */

        * {
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selector */

        a:visited {
            color: yellow;
        }

        a:link {
            color: green;
        }

        a:active {
            background-color: red;
        }

        a:hover {
            background-color: yellow;
        }

        p:first-child {
            background-color: aqua;
        }


    </style>
</head>

<body>
    <div>
        <main class="one">
            <p>I am first</p>
            <p>I am Second</p>
        </main>
    </div>
    <div class="red">
        I am a div
        <article>
            <p>I am a Para</p>
        </article>
    </div>

    <div id="green">
        I am another div
    </div>
    <a href="https://www.google.com">Google</a>
    <a href="https://www.google2.com">Google</a>
</body>

</html>
