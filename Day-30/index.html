<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transforms</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box { 
            height: 50px;
            width: 50px;
            background-color: beige;
            transform: rotate(0.125turn);
            transform-origin: -50% -50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            margin: 55px;
            width: 100vw;
            height: 80vh;
            border: 2px solid purple;
            
        }
    </style>
<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>
</html>
