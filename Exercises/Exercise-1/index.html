<!-- Write a HTML and CSS CODE to style a paragraph inside a div which contains 5 other paragraphs. The first paragraph must have background color yellow and text color red. The other paragraphs must have color blue and text color white.    -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-1</title>
    <style>
        p:first-child { 
            color: red ;
            background-color: yellow;
        }
        p {
            color: white;
            background-color: blue;
        }
    </style>
</head>

<body>
    <div>
        <p>Para-1</p>
        <p>Para-2</p>
        <p>Para-3</p>
        <p>Para-4</p>
        <p>para-5</p>
    </div>
</body>

</html>
